<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting to jenniferchukwu.com</title>
    <link rel="canonical" href="https://jenniferchukwu.com/" />
    <meta http-equiv="refresh" content="0; url=https://jenniferchukwu.com/" />
    <meta name="robots" content="noindex" />
    <script>
      // Preserve the path/query when redirecting (e.g. /posts/foo -> jenniferchukwu.com/posts/foo)
      var target = "https://jenniferchukwu.com" + window.location.pathname + window.location.search + window.location.hash;
      window.location.replace(target);
    </script>
  </head>
  <body>
    <p>This site has moved to <a href="https://jenniferchukwu.com/">jenniferchukwu.com</a>.</p>
  </body>
</html>
